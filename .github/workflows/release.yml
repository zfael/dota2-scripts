name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact_name: dota2-scripts-tauri.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync Cargo.toml version with git tag
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          # Strip 'v' prefix from tag to get semver (v1.0.0 -> 1.0.0)
          $VERSION = $TAG -replace '^v', ''

          if ($VERSION -match '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)(?:-rc\.(?<rc>\d+))?$') {
            $major = [int]$Matches.major
            $minor = [int]$Matches.minor
            $patch = [int]$Matches.patch
            $rc = if ($Matches.rc) { [int]$Matches.rc } else { $null }

            if ($patch -gt 655) {
              Write-Error "Patch version $patch exceeds MSI encoding limit (max 655)"
              exit 1
            }

            if ($null -ne $rc -and $rc -gt 98) {
              Write-Error "RC version $rc exceeds MSI encoding limit (max 98)"
              exit 1
            }

            # Windows Installer only compares the first three ProductVersion fields.
            # Encode rc builds below the eventual stable release while keeping all values numeric.
            $MSI_VERSION = if ($null -ne $rc) {
              "$major.$minor.$(($patch * 100) + $rc)"
            } else {
              "$major.$minor.$(($patch * 100) + 99)"
            }
          } else {
            Write-Error "Unsupported tag format for MSI version derivation: $VERSION"
            exit 1
          }
          
          Write-Host "Syncing Cargo.toml version to: $VERSION"
          Write-Host "Derived MSI version: $MSI_VERSION"
          
          # Update root Cargo.toml [package] version
          $lines = Get-Content "Cargo.toml"
          $inPackage = $false
          $versionUpdated = $false
          
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^\[package\]') {
              $inPackage = $true
            }
            elseif ($lines[$i] -match '^\[' -and $inPackage) {
              break
            }
            elseif ($inPackage -and -not $versionUpdated -and $lines[$i] -match '^version\s*=') {
              $lines[$i] = "version = `"$VERSION`""
              $versionUpdated = $true
              Write-Host "Updated root Cargo.toml line $($i + 1): $($lines[$i])"
            }
          }
          
          if (-not $versionUpdated) {
            Write-Error "Failed to find version in root [package] section"
            exit 1
          }
          $lines | Set-Content "Cargo.toml"
          
          # Update src-tauri/Cargo.toml [package] version
          $tauriLines = Get-Content "src-tauri/Cargo.toml"
          $inPackage = $false
          $versionUpdated = $false
          
          for ($i = 0; $i -lt $tauriLines.Count; $i++) {
            if ($tauriLines[$i] -match '^\[package\]') {
              $inPackage = $true
            }
            elseif ($tauriLines[$i] -match '^\[' -and $inPackage) {
              break
            }
            elseif ($inPackage -and -not $versionUpdated -and $tauriLines[$i] -match '^version\s*=') {
              $tauriLines[$i] = "version = `"$VERSION`""
              $versionUpdated = $true
              Write-Host "Updated src-tauri/Cargo.toml line $($i + 1): $($tauriLines[$i])"
            }
          }
          $tauriLines | Set-Content "src-tauri/Cargo.toml"
          
          # Update src-tauri/tauri.conf.json version
          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $conf.version = $VERSION
          if (-not $conf.bundle.PSObject.Properties['windows']) {
            $conf.bundle | Add-Member -NotePropertyName windows -NotePropertyValue ([pscustomobject]@{})
          }
          if (-not $conf.bundle.windows.PSObject.Properties['wix']) {
            $conf.bundle.windows | Add-Member -NotePropertyName wix -NotePropertyValue ([pscustomobject]@{})
          }
          $conf.bundle.windows.wix | Add-Member -NotePropertyName version -NotePropertyValue $MSI_VERSION -Force
          $conf | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json"
          Write-Host "Updated tauri.conf.json version to: $VERSION"
          Write-Host "Updated tauri.conf.json bundle.windows.wix.version to: $MSI_VERSION"

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }} --bundles msi --ci

      - name: Package ZIP artifact
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $TARGET = "${{ matrix.target }}"
          $PACKAGE_DIR = "artifacts/dota2-scripts-${VERSION}-${TARGET}"
          
          New-Item -ItemType Directory -Force -Path $PACKAGE_DIR
          New-Item -ItemType Directory -Force -Path "$PACKAGE_DIR/config"
          
          # Copy executable from Tauri build output (workspace target dir)
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" -Destination "$PACKAGE_DIR/dota2-scripts.exe"
          Copy-Item "config/config.toml" -Destination "$PACKAGE_DIR/config/config.example.toml"
          
          Compress-Archive -Path "$PACKAGE_DIR/*" -DestinationPath "artifacts/dota2-scripts-${VERSION}-${TARGET}.zip" -Force
          
          Write-Host "ZIP package contents:"
          Get-ChildItem -Recurse $PACKAGE_DIR

      - name: Collect MSI installer
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $TARGET = "${{ matrix.target }}"
          $MSI_DIR = "target/${{ matrix.target }}/release/bundle/msi"
          
          if (Test-Path $MSI_DIR) {
            $msi = Get-ChildItem "$MSI_DIR/*.msi" | Select-Object -First 1
            if ($msi) {
              $dest = "artifacts/dota2-scripts-${VERSION}-${TARGET}.msi"
              Copy-Item $msi.FullName $dest
              Write-Host "MSI installer: $dest"
            } else {
              Write-Error "No MSI found in $MSI_DIR"
              exit 1
            }
          } else {
            Write-Error "MSI directory not found: $MSI_DIR"
            exit 1
          }

      - name: Package config template artifact
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          Copy-Item "config/config.toml" "artifacts/dota2-scripts-${VERSION}-config.template.toml"

      - name: Package MSI installer assets
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $TARGET = "${{ matrix.target }}"
          $MSI = "artifacts/dota2-scripts-${VERSION}-${TARGET}.msi"
          $TEMPLATE = "artifacts/dota2-scripts-${VERSION}-config.template.toml"
          $INSTALLER_DIR = "artifacts/dota2-scripts-${VERSION}-${TARGET}-installer-assets"

          if (-not (Test-Path $MSI)) {
            Write-Error "Missing MSI installer artifact: $MSI"
            exit 1
          }

          if (-not (Test-Path $TEMPLATE)) {
            Write-Error "Missing config template artifact: $TEMPLATE"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path $INSTALLER_DIR | Out-Null
          Copy-Item $MSI -Destination $INSTALLER_DIR
          Copy-Item $TEMPLATE -Destination $INSTALLER_DIR

          Write-Host "Installer asset bundle contents:"
          Get-ChildItem $INSTALLER_DIR

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: dota2-scripts-${{ github.ref_name }}-${{ matrix.target }}-zip
          path: artifacts/dota2-scripts-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dota2-scripts-${{ github.ref_name }}-${{ matrix.target }}-msi
          path: artifacts/dota2-scripts-${{ github.ref_name }}-${{ matrix.target }}.msi

      - name: Upload config template artifact
        uses: actions/upload-artifact@v4
        with:
          name: dota2-scripts-${{ github.ref_name }}-config-template
          path: artifacts/dota2-scripts-${{ github.ref_name }}-config.template.toml

      - name: Upload MSI installer assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: dota2-scripts-${{ github.ref_name }}-${{ matrix.target }}-installer-assets
          path: artifacts/dota2-scripts-${{ github.ref_name }}-${{ matrix.target }}-installer-assets

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          echo "Current tag: $CURRENT_TAG"
          
          # Determine comparison tag based on version type
          if [[ "$CURRENT_TAG" =~ -rc\.([0-9]+)$ ]]; then
            # This is an RC release
            RC_NUM="${BASH_REMATCH[1]}"
            BASE_VERSION=$(echo "$CURRENT_TAG" | sed 's/-rc\.[0-9]*$//')
            
            if [ "$RC_NUM" -eq 1 ]; then
              # First RC: compare with previous stable
              COMPARE_TAG=$(git tag -l 'v*' | grep -v '\-rc' | sort -V | tail -n1)
              COMPARE_TYPE="stable release"
            else
              # Subsequent RC: compare with previous RC
              PREV_RC=$((RC_NUM - 1))
              COMPARE_TAG="${BASE_VERSION}-rc.${PREV_RC}"
              COMPARE_TYPE="previous RC"
            fi
          else
            # This is a stable release: compare with previous stable
            COMPARE_TAG=$(git tag -l 'v*' | grep -v '\-rc' | grep -v "^${CURRENT_TAG}$" | sort -V | tail -n1)
            COMPARE_TYPE="stable release"
          fi
          
          echo "Comparing with: $COMPARE_TAG ($COMPARE_TYPE)"
          echo "compare_tag=$COMPARE_TAG" >> $GITHUB_OUTPUT
          echo "compare_type=$COMPARE_TYPE" >> $GITHUB_OUTPUT
          
          # Generate changelog
          if [ -n "$COMPARE_TAG" ] && git rev-parse "$COMPARE_TAG" >/dev/null 2>&1; then
            echo "Generating changelog from $COMPARE_TAG to $CURRENT_TAG"
            
            # Get commits grouped by type
            FEATURES=$(git log ${COMPARE_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^feat" --extended-regexp | head -20)
            FIXES=$(git log ${COMPARE_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^fix" --extended-regexp | head -20)
            OTHER=$(git log ${COMPARE_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^\(chore\|docs\|refactor\|perf\|test\|build\|ci\|style\)" --extended-regexp | head -10)
            
            # Build changelog markdown
            CHANGELOG=""
            
            if [ -n "$FEATURES" ]; then
              CHANGELOG="${CHANGELOG}#### ✨ New Features\n${FEATURES}\n\n"
            fi
            
            if [ -n "$FIXES" ]; then
              CHANGELOG="${CHANGELOG}#### 🐛 Bug Fixes\n${FIXES}\n\n"
            fi
            
            if [ -n "$OTHER" ]; then
              CHANGELOG="${CHANGELOG}#### 🔧 Other Changes\n${OTHER}\n\n"
            fi
            
            if [ -z "$CHANGELOG" ]; then
              # Fallback: show all commits if no conventional commits found
              ALL_COMMITS=$(git log ${COMPARE_TAG}..${CURRENT_TAG} --pretty=format:"- %s" | head -20)
              if [ -n "$ALL_COMMITS" ]; then
                CHANGELOG="#### 📝 Changes\n${ALL_COMMITS}\n\n"
              else
                CHANGELOG="No changes detected.\n"
              fi
            fi
            
            # Add comparison link
            CHANGELOG="${CHANGELOG}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${COMPARE_TAG}...${CURRENT_TAG}"
          else
            CHANGELOG="Initial release.\n\n**Full Changelog**: https://github.com/${{ github.repository }}/commits/${CURRENT_TAG}"
          fi
          
          # Save to file (handles multiline)
          echo -e "$CHANGELOG" > changelog.md
          echo "Changelog generated:"
          cat changelog.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare release body
        run: |
          cat << 'HEADER' > release_body.md
          ## Dota2 Scripts ${{ github.ref_name }}
          
          ${{ contains(github.ref, '-rc') && '⚠️ **This is a Release Candidate** - Not recommended for production use. Please test and report issues.' || '' }}
          
          ### 📋 Changelog (compared to ${{ steps.changelog.outputs.compare_tag }})
          
          HEADER
          
          cat changelog.md >> release_body.md
          
          cat << 'FOOTER' >> release_body.md
          
          ---
          
          ⚠️ **WARNING**: Using game automation scripts may violate Terms of Service and result in account bans. Use at your own risk!
          
          ### 📥 Downloads
          - **Windows (ZIP)**: `dota2-scripts-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip` (includes exe + example config)
          - **Windows (MSI)**: `dota2-scripts-${{ github.ref_name }}-x86_64-pc-windows-msvc.msi` (installer + in-app update target)
          - **Config template**: `dota2-scripts-${{ github.ref_name }}-config.template.toml` (used by in-app config merge)
          
          ### 📋 Requirements
          - Windows 10/11
          - Administrator privileges (UAC prompt will appear on launch)
          - Dota 2 with GSI configured
          
          ### ⚡ Features
          - Hero-specific automation (Broodmother, Huskar, Largo, Legion Commander, Meepo, Outworld Destroyer, Shadow Fiend, Tiny)
          - GSI event-based action dispatch
          - Danger detection and survivability automation
          - Standalone hotkey triggers
          - React-based UI with live game state
          
          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for setup and usage instructions.
          FOOTER
          
          echo "Final release body:"
          cat release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/dota2-scripts-${{ github.ref_name }}-x86_64-pc-windows-msvc-zip/dota2-scripts-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
            artifacts/dota2-scripts-${{ github.ref_name }}-x86_64-pc-windows-msvc-msi/dota2-scripts-${{ github.ref_name }}-x86_64-pc-windows-msvc.msi
            artifacts/dota2-scripts-${{ github.ref_name }}-config-template/dota2-scripts-${{ github.ref_name }}-config.template.toml
          body_path: release_body.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
