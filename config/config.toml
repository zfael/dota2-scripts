[server]
port = 3000

# Auto-update settings
[updates]
# Check for updates when the application starts
check_on_startup = true
# Include pre-release versions (RC, alpha, beta)
include_prereleases = false

[keybindings]
slot0 = "z"
slot1 = "x"
slot2 = "c"
slot3 = "v"
slot4 = "b"
slot5 = "n"
neutral0 = "0"
combo_trigger = "Home"

[logging]
level = "info"

[rune_alerts]
enabled = true
alert_lead_seconds = 10
interval_seconds = 120
audio_enabled = true

[minimap_capture]
enabled = false
minimap_x = 2
minimap_y = 835
minimap_width = 240
minimap_height = 245
capture_interval_ms = 1000
sample_every_n = 30
artifact_output_dir = "logs/minimap_capture"

[common]
survivability_hp_threshold = 30

[armlet]
enabled = true
cast_modifier = "Alt"
toggle_threshold = 320
predictive_offset = 30
toggle_cooldown_ms = 250

[heroes.huskar]
berserker_blood_key = "e"
berserker_blood_delay_ms = 300
standalone_key = "Home"

[heroes.huskar.armlet]
toggle_threshold = 120
predictive_offset = 150
toggle_cooldown_ms = 300

[heroes.legion_commander]
standalone_key = "Home"

[heroes.shadow_fiend]
# Enable raze interception (ALT + right-click before Q/W/E)
raze_intercept_enabled = true
# Delay between right-click and raze key press (ms)
raze_delay_ms = 10
# Automatically use BKB before ultimate (Requiem of Souls) when pressing R
# Sequence: BKB (double-tap) → D (if enabled) → R
auto_bkb_on_ultimate = true
# Automatically press D (Aghanim's ability) before ultimate
auto_d_on_ultimate = true
# Standalone combo key: Blink + Ultimate (only executes if Blink is off cooldown)
# Sequence: Blink → BKB (if enabled) → D (if enabled) → R
standalone_key = "Home"

[heroes.tiny]
standalone_key = "Home"

[heroes.outworld_destroyer]
standalone_key = "Home"
objurgation_key = "e"
arcane_orb_key = "q"
astral_imprisonment_key = "w"
auto_objurgation_on_danger = true
objurgation_hp_threshold_percent = 55
objurgation_min_mana_percent = 25
objurgation_trigger_cooldown_ms = 1500
ultimate_intercept_enabled = true
auto_bkb_on_ultimate = true
auto_objurgation_on_ultimate = true
post_bkb_delay_ms = 50
post_blink_delay_ms = 100
astral_self_cast_enabled = false
astral_self_cast_key = "F5"
combo_items = ["sheepstick", "bloodthorn"]
combo_item_spam_count = 1
combo_item_delay_ms = 50
post_ultimate_arcane_orb_presses = 0
arcane_orb_press_interval_ms = 30

[danger_detection]
enabled = true
hp_threshold_percent = 70
rapid_loss_hp = 100
time_window_ms = 500
clear_delay_seconds = 3
healing_threshold_in_danger = 50
max_healing_items_per_danger = 3
auto_bkb = false
auto_satanic = true
satanic_hp_threshold = 40
auto_blade_mail = true
auto_glimmer_cape = true
auto_ghost_scepter = true
auto_shivas_guard = true
# Auto-use Manta Style when silenced (independent of danger detection)
auto_manta_on_silence = true
# Auto-use Lotus Orb when silenced (self-cast, independent of danger detection)
auto_lotus_on_silence = true

[neutral_items]
enabled = true
self_cast_key = "0"
log_discoveries = false
use_in_danger = true
hp_threshold = 50
allowed_items = [
    "item_essence_ring",
    "item_minotaur_horn",
    "item_jidi_pollen_bag",
    "item_metamorphic_mandible",
    "item_riftshadow_prism",
    "item_kobold_cup",
    "item_polliwog_charm",
    "item_ash_legion_shield",
    "item_mana_draught",
    "item_pogo_stick",
    "item_psychic_headband",
    "item_crippling_crossbow",
    "item_idol_of_screeauk",
    "item_flayers_bota"
]

[heroes.largo]
amphibian_rhapsody_enabled = true
auto_toggle_on_danger = true
mana_threshold_percent = 20  # Auto-disable ultimate below this mana
heal_hp_threshold = 50  # Switch to Island Elixir when HP below this
beat_interval_ms = 995  # Beat timing in milliseconds (990-1000)
beat_correction_ms = 30  # Correction to apply every N beats (negative = speed up, positive = slow down)
beat_correction_every_n_beats = 5  # Apply correction every N beats (0 = disabled)
q_ability_key = "q"  # Bullbelly Blitz (damage)
w_ability_key = "w"  # Hotfeet Hustle (movement)
e_ability_key = "e"  # Island Elixir (healing)
r_ability_key = "r"  # Amphibian Rhapsody toggle
standalone_key = "Home"  # Manual ultimate activation

[heroes.broodmother]
# Spider micro: Middle Mouse triggers select spiders → right-click → reselect hero
spider_micro_enabled = true
spider_control_group_key = "F3"  # Use "Select All Other Units" hotkey (bind in Dota 2 settings)
reselect_hero_key = "1"          # Key to reselect hero after command
attack_key = "a"                 # Not used (right-click move instead)
# Auto-items: Hold modifier + right-click to use items then attack
auto_items_enabled = true
auto_items_modifier = "Space"    # Hold this key + right-click
auto_items = ["orchid", "bloodthorn", "diffusal", "disperser", "nullifier", "abyssal_blade"]
# Auto-abilities: Cast abilities during Space+Right-click combo
# Each entry: index (ability0-5), key to press, optional hp_threshold (only cast if HP% below)
# Broodmother abilities: 0=Insatiable Hunger(Q), 1=Spin Web(W), 2=Incapacitating Bite(E), 
#                        3=Spider's Milk(D), 4=Spawn Spiderlings(R-ult)
auto_abilities = [
    { index = 0, key = "q", hp_threshold = 80 },  # Insatiable Hunger when HP < 80%
    { index = 4, key = "r" },                      # Spawn Spiderlings (ultimate) - always
]
# Execution order: false = items first (default), true = abilities first
auto_abilities_first = false

[heroes.meepo]
standalone_key = "Home"
earthbind_key = "q"
poof_key = "w"
dig_key = "d"
megameepo_key = "f"
post_blink_delay_ms = 80
combo_items = ["sheepstick", "disperser"]
combo_item_spam_count = 1
combo_item_delay_ms = 40
earthbind_press_count = 2
earthbind_press_interval_ms = 30
poof_press_count = 3
poof_press_interval_ms = 35
auto_dig_on_danger = true
dig_hp_threshold_percent = 32
auto_megameepo_on_danger = true
megameepo_hp_threshold_percent = 45
defensive_trigger_cooldown_ms = 1500

[heroes.meepo.farm_assist]
enabled = true
toggle_key = "End"
pulse_interval_ms = 700
minimum_mana_percent = 35
minimum_health_percent = 45
right_click_after_poof = true
suspend_on_danger = true
suspend_after_manual_combo_ms = 2500
poof_press_count = 1
poof_press_interval_ms = 35

[gsi_logging]
enabled = false
output_dir = "logs/gsi_events"

[soul_ring]
# Master toggle for Soul Ring automation
enabled = true
# Only trigger Soul Ring if mana percent is below this threshold
min_mana_percent = 100
# Safety threshold - don't use Soul Ring if health percent is at or below this (avoid suicide)
min_health_percent = 20
# Delay in milliseconds between Soul Ring press and ability press
delay_before_ability_ms = 30
# Cooldown lockout in milliseconds to prevent double-fire on double-tap
trigger_cooldown_ms = 10
# Ability keys to intercept for Soul Ring triggering
ability_keys = ["q", "w", "e", "r", "d", "f"]
# Also trigger Soul Ring before item key presses (items that cost mana)
intercept_item_keys = true
